server:
  port: 8081
spring:
  application:
    name: duenos-mascotas
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/bd_veterinaria_duenos?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    register-whit-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: false

jwt:
  secret: MI_CLAVE_SECRETA_SUPER_LARGA_PARA_FIRMAR_TOKENS_123456

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE
