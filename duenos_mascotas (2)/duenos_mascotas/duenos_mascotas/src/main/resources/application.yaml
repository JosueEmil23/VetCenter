server:
  port: 8081
spring:
  application:
    name: duenos-mascotas
  datasource:
    url: jdbc:mysql://localhost:3306/bd_veterinaria_duenos?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect