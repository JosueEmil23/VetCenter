server:
  port: 8082

spring:
  application:
    name: reservas
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/bd_veterinaria_reservas?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest


  cloud:
    openfeign:
      client:
        config:
          default:
            loggerLevel: FULL

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: false

jwt:
  secret: MI_CLAVE_SECRETA_SUPER_LARGA_PARA_FIRMAR_TOKENS_123456

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE