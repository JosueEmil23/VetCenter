server:
  port: 8085

spring:
  application:
    name: auth-service

  cloud:
    compatibility-verifier:
      enabled: false

  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:3306/auth_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: false

jwt:
  secret: MI_CLAVE_SECRETA_SUPER_LARGA_PARA_FIRMAR_TOKENS_123456
  expiration: 3600000

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE